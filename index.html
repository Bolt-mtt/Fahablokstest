<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerBuild® – VW Gol G1 Edição Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0d0d0d;
    --white: #ffffff;
    --sand: #d4c9a8;
    --sand-light: #f5f1e8;
    --vw-blue: #001e50;
    --accent: #e8c832;
    --gray: #6b6b6b;
    --gray-light: #f4f4f4;
    --border: #e2e2e2;
    --ff-display: 'Bebas Neue', sans-serif;
    --ff-body: 'DM Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--ff-body); background: var(--white); color: var(--black); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  /* ANN BAR */
  .ann-bar { background: var(--vw-blue); color: var(--white); text-align: center; padding: 10px 20px; font-size: 13px; font-weight: 500; letter-spacing: 0.03em; }
  .ann-bar span { color: var(--accent); font-weight: 700; }

  /* HEADER */
  header { position: sticky; top: 0; z-index: 200; background: var(--white); border-bottom: 1px solid var(--border); }
  .header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 64px; }
  .logo { font-family: var(--ff-display); font-size: 24px; letter-spacing: 0.04em; color: var(--black); text-decoration: none; cursor: pointer; }
  nav { display: flex; gap: 28px; }
  nav a { font-size: 13px; font-weight: 500; color: var(--gray); text-decoration: none; letter-spacing: 0.02em; transition: color .2s; cursor: pointer; }
  nav a:hover { color: var(--black); }
  .cart-btn { display: flex; align-items: center; gap: 6px; background: var(--black); color: var(--white); border: none; cursor: pointer; padding: 8px 16px; font-family: var(--ff-body); font-size: 13px; font-weight: 600; letter-spacing: 0.03em; transition: background .2s; position: relative; }
  .cart-btn:hover { background: var(--vw-blue); }
  .cart-count { background: var(--accent); color: var(--black); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }

  /* CART DRAWER */
  .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; opacity: 0; pointer-events: none; transition: opacity .3s; }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-drawer { position: fixed; top: 0; right: -420px; width: 420px; max-width: 100vw; height: 100vh; background: var(--white); z-index: 400; display: flex; flex-direction: column; transition: right .35s cubic-bezier(.4,0,.2,1); box-shadow: -4px 0 32px rgba(0,0,0,.12); }
  .cart-drawer.open { right: 0; }
  .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .cart-title { font-family: var(--ff-display); font-size: 22px; letter-spacing: 0.04em; }
  .cart-close { background: none; border: none; cursor: pointer; font-size: 24px; color: var(--gray); line-height: 1; padding: 4px; transition: color .2s; }
  .cart-close:hover { color: var(--black); }
  .cart-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .cart-empty { text-align: center; padding: 60px 20px; }
  .cart-empty-icon { font-size: 48px; margin-bottom: 16px; }
  .cart-empty-text { font-size: 15px; color: var(--gray); margin-bottom: 20px; }
  .cart-item { display: flex; gap: 14px; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid var(--border); }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-img { width: 72px; height: 72px; background: var(--sand-light); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .cart-item-img img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .cart-item-variant { font-size: 12px; color: var(--gray); margin-bottom: 8px; }
  .cart-item-controls { display: flex; align-items: center; gap: 8px; }
  .cart-qty-btn { width: 28px; height: 28px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background .2s; }
  .cart-qty-btn:hover { background: var(--gray-light); }
  .cart-qty-num { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
  .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .cart-item-price { font-size: 14px; font-weight: 700; }
  .cart-remove { background: none; border: none; cursor: pointer; color: var(--gray); font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; transition: color .2s; display: flex; align-items: center; gap: 4px; padding: 2px 0; }
  .cart-remove:hover { color: #e53935; }
  .cart-footer { padding: 20px 24px; border-top: 1px solid var(--border); background: var(--white); }
  .cart-subtotal { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
  .cart-total { display: flex; justify-content: space-between; font-family: var(--ff-display); font-size: 22px; letter-spacing: 0.02em; margin-bottom: 16px; }
  .cart-checkout-btn { width: 100%; background: var(--vw-blue); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 20px; letter-spacing: 0.06em; padding: 15px; transition: background .2s; }
  .cart-checkout-btn:hover { background: #002a70; }
  .cart-continue-btn { width: 100%; background: none; border: 1.5px solid var(--border); color: var(--black); cursor: pointer; font-family: var(--ff-body); font-size: 13px; font-weight: 600; padding: 11px; margin-top: 8px; transition: border-color .2s; }
  .cart-continue-btn:hover { border-color: var(--black); }

  /* ============ LANDING PAGE ============ */
  .landing-hero {
    background: var(--vw-blue);
    min-height: calc(100vh - 100px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .landing-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(232,200,50,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-text-col { padding: 80px 64px 80px 80px; position: relative; z-index: 2; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: rgba(232,200,50,0.15); border: 1px solid rgba(232,200,50,0.3); padding: 6px 14px; margin-bottom: 28px; }
  .hero-eyebrow-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
  .hero-eyebrow-text { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
  .hero-title { font-family: var(--ff-display); font-size: 96px; line-height: 0.95; letter-spacing: 0.02em; color: var(--white); margin-bottom: 12px; }
  .hero-title .accent-line { color: var(--accent); display: block; }
  .hero-subtitle { font-size: 16px; color: rgba(255,255,255,0.65); font-weight: 400; margin-bottom: 36px; line-height: 1.6; max-width: 400px; }
  .hero-price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 32px; }
  .hero-price { font-family: var(--ff-display); font-size: 52px; color: var(--white); line-height: 1; }
  .hero-price-old { font-size: 20px; color: rgba(255,255,255,0.4); text-decoration: line-through; }
  .hero-price-badge { background: var(--accent); color: var(--black); font-size: 12px; font-weight: 700; padding: 3px 10px; letter-spacing: 0.06em; }
  .hero-cta-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .hero-cta-primary { background: var(--accent); color: var(--black); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 20px; letter-spacing: 0.06em; padding: 16px 36px; transition: all .2s; }
  .hero-cta-primary:hover { background: #f5d94a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,200,50,0.3); }
  .hero-cta-secondary { background: transparent; color: var(--white); border: 1.5px solid rgba(255,255,255,0.3); cursor: pointer; font-family: var(--ff-body); font-size: 14px; font-weight: 600; padding: 16px 28px; transition: border-color .2s; }
  .hero-cta-secondary:hover { border-color: var(--white); }
  .hero-trust-strip { display: flex; gap: 24px; margin-top: 40px; flex-wrap: wrap; }
  .hero-trust-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.6); }
  .hero-trust-item strong { color: rgba(255,255,255,0.9); }

  .hero-img-col { position: relative; height: 100%; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .hero-img-wrap { position: relative; width: 100%; max-width: 580px; }
  .hero-img-glow { position: absolute; inset: -40px; background: radial-gradient(ellipse, rgba(232,200,50,0.15) 0%, transparent 70%); pointer-events: none; }
  .hero-img-main { width: 100%; height: auto; display: block; position: relative; z-index: 1; filter: drop-shadow(0 20px 60px rgba(0,0,0,0.5)); animation: float 4s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .hero-img-badge { position: absolute; bottom: -10px; right: 20px; background: var(--white); padding: 10px 16px; z-index: 2; }
  .hero-img-badge-top { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--gray); text-transform: uppercase; }
  .hero-img-badge-num { font-family: var(--ff-display); font-size: 22px; color: var(--vw-blue); line-height: 1; }
  .hero-img-badge-sub { font-size: 10px; color: var(--gray); }

  /* STATS BAR */
  .stats-bar { background: var(--accent); padding: 20px 32px; }
  .stats-inner { max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .stat-item { text-align: center; padding: 4px 0; border-right: 1px solid rgba(0,0,0,0.12); }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-family: var(--ff-display); font-size: 32px; color: var(--black); letter-spacing: 0.02em; line-height: 1; }
  .stat-label { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.6); letter-spacing: 0.06em; text-transform: uppercase; }

  /* PRODUCT CARD SECTION */
  .landing-products { max-width: 1280px; margin: 0 auto; padding: 80px 32px; }
  .landing-section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 40px; }
  .landing-section-title { font-family: var(--ff-display); font-size: 48px; letter-spacing: 0.02em; line-height: 1; }
  .landing-section-sub { font-size: 14px; color: var(--gray); }
  .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .product-card { border: 1px solid var(--border); cursor: pointer; transition: box-shadow .25s, transform .25s; background: var(--white); overflow: hidden; }
  .product-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.1); transform: translateY(-4px); }
  .product-card-img { background: var(--sand-light); aspect-ratio: 4/3; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
  .product-card-img img { width: 100%; height: 100%; object-fit: contain; padding: 20px; transition: transform .35s; }
  .product-card:hover .product-card-img img { transform: scale(1.04); }
  .product-card-badge { position: absolute; top: 12px; left: 12px; background: var(--black); color: var(--white); font-size: 10px; font-weight: 700; padding: 4px 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .product-card-badge.sale { background: #e53935; }
  .product-card-body { padding: 20px; }
  .product-card-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .product-card-desc { font-size: 13px; color: var(--gray); margin-bottom: 14px; line-height: 1.4; }
  .product-card-footer { display: flex; align-items: center; justify-content: space-between; }
  .product-card-price { font-family: var(--ff-display); font-size: 24px; color: var(--black); }
  .product-card-old { font-size: 13px; color: var(--gray); text-decoration: line-through; margin-left: 6px; }
  .product-card-btn { background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 14px; letter-spacing: 0.04em; padding: 8px 16px; transition: background .2s; }
  .product-card-btn:hover { background: var(--vw-blue); }

  /* HOW IT WORKS */
  .how-it-works { background: var(--sand-light); padding: 80px 32px; }
  .how-inner { max-width: 1280px; margin: 0 auto; }
  .how-title { font-family: var(--ff-display); font-size: 48px; letter-spacing: 0.02em; margin-bottom: 48px; text-align: center; }
  .how-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; }
  .how-step { text-align: center; }
  .how-step-num { font-family: var(--ff-display); font-size: 64px; color: var(--sand); line-height: 1; margin-bottom: 12px; }
  .how-step-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
  .how-step-desc { font-size: 13px; color: var(--gray); line-height: 1.5; }

  /* ============ PRODUCT PAGE ============ */
  .breadcrumb { max-width: 1280px; margin: 0 auto; padding: 16px 32px; font-size: 12px; color: var(--gray); display: flex; gap: 6px; align-items: center; }
  .breadcrumb a { color: var(--gray); text-decoration: none; cursor: pointer; }
  .breadcrumb a:hover { color: var(--black); }
  .breadcrumb-sep { color: var(--border); }
  .product-layout { max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: 1fr 480px; gap: 64px; padding: 0 32px 80px; align-items: start; }
  .gallery { position: sticky; top: 80px; }
  .gallery-main { aspect-ratio: 1/1; background: var(--sand-light); overflow: hidden; position: relative; border: 1px solid var(--border); }
  .gallery-main img { width: 100%; height: 100%; object-fit: contain; padding: 24px; }
  .badge-licensed { position: absolute; bottom: 16px; right: 16px; background: var(--vw-blue); color: var(--white); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; padding: 4px 10px; text-transform: uppercase; }
  .gallery-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
  .thumb { aspect-ratio: 1/1; background: var(--sand-light); cursor: pointer; overflow: hidden; border: 2px solid transparent; transition: border-color .2s; border: 1px solid var(--border); }
  .thumb.active { border-color: var(--black) !important; }
  .thumb img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
  .product-info { padding-top: 8px; }
  .product-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: var(--black); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; padding: 4px 10px; text-transform: uppercase; margin-bottom: 16px; }
  .product-title { font-family: var(--ff-display); font-size: 48px; line-height: 1; letter-spacing: 0.02em; margin-bottom: 4px; }
  .product-subtitle { font-size: 14px; color: var(--gray); font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 20px; }
  .rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .stars { color: var(--accent); font-size: 15px; letter-spacing: 1px; }
  .rating-text { font-size: 13px; color: var(--gray); }
  .rating-link { color: var(--black); font-weight: 600; font-size: 13px; text-decoration: none; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
  .price-main { font-family: var(--ff-display); font-size: 42px; line-height: 1; }
  .price-old { font-size: 18px; color: var(--gray); text-decoration: line-through; }
  .price-save { background: #ff4444; color: var(--white); font-size: 12px; font-weight: 700; padding: 2px 8px; letter-spacing: 0.05em; }
  .price-installments { font-size: 13px; color: var(--gray); margin-bottom: 24px; }
  .price-installments strong { color: var(--black); }
  .option-label { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .option-label span { font-weight: 400; color: var(--gray); }
  .variant-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .variant-btn { padding: 8px 16px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-family: var(--ff-body); font-size: 13px; font-weight: 500; transition: all .2s; color: var(--black); }
  .variant-btn.active { border-color: var(--black); background: var(--black); color: var(--white); }
  .variant-btn:hover:not(.active) { border-color: #999; }
  .qty-cart-row { display: flex; gap: 12px; margin-bottom: 16px; align-items: stretch; }
  .qty-control { display: flex; align-items: center; border: 1.5px solid var(--border); background: var(--white); }
  .qty-btn { width: 42px; height: 52px; display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; font-size: 20px; color: var(--black); transition: background .2s; }
  .qty-btn:hover { background: var(--gray-light); }
  .qty-num { width: 42px; text-align: center; font-weight: 600; font-size: 15px; }
  .add-btn { flex: 1; background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 20px; letter-spacing: 0.06em; transition: background .2s; height: 52px; }
  .add-btn:hover { background: var(--vw-blue); }
  .buy-now-btn { width: 100%; background: var(--vw-blue); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 20px; letter-spacing: 0.06em; height: 52px; transition: background .2s; margin-bottom: 24px; }
  .buy-now-btn:hover { background: #002a70; }
  .trust-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 28px; }
  .trust-item { background: var(--white); padding: 14px 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
  .trust-icon { font-size: 22px; }
  .trust-label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; line-height: 1.3; }
  .trust-sub { font-size: 10px; color: var(--gray); }
  .accordion-item { border-top: 1px solid var(--border); }
  .accordion-item:last-child { border-bottom: 1px solid var(--border); }
  .accordion-trigger { width: 100%; background: none; border: none; cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 16px 0; font-family: var(--ff-body); font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--black); text-align: left; }
  .accordion-chevron { font-size: 18px; transition: transform .3s; font-weight: 300; }
  .accordion-chevron.open { transform: rotate(180deg); }
  .accordion-body { padding-bottom: 16px; font-size: 13px; color: var(--gray); line-height: 1.7; }
  .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-top: 8px; }
  .spec-item { display: flex; flex-direction: column; }
  .spec-k { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray); }
  .spec-v { font-size: 13px; color: var(--black); font-weight: 500; }

  /* FEATURES */
  .features-strip { background: var(--vw-blue); color: var(--white); padding: 48px 32px; }
  .features-inner { max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; }
  .feat-item { text-align: center; }
  .feat-icon { font-size: 32px; margin-bottom: 12px; }
  .feat-title { font-family: var(--ff-display); font-size: 18px; letter-spacing: 0.04em; margin-bottom: 4px; }
  .feat-desc { font-size: 12px; opacity: 0.7; line-height: 1.5; }

  /* REVIEWS */
  .reviews-section { max-width: 1280px; margin: 0 auto; padding: 80px 32px; }
  .section-title { font-family: var(--ff-display); font-size: 40px; letter-spacing: 0.02em; margin-bottom: 8px; }
  .section-subtitle { font-size: 14px; color: var(--gray); margin-bottom: 40px; }
  .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .review-card { border: 1px solid var(--border); padding: 24px; transition: box-shadow .2s; }
  .review-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .review-stars { color: var(--accent); margin-bottom: 12px; }
  .review-text { font-size: 13px; color: var(--black); line-height: 1.6; margin-bottom: 16px; }
  .review-author { font-size: 12px; color: var(--gray); font-weight: 600; }

/* ===== CHECKOUT PAGE ===== */
function CheckoutPage({ cart, onSuccess, onRemove, onQtyChange }) {
  const [payMethod, setPayMethod] = useState('card');
  const [step, setStep] = useState(1);
  const [errors, setErrors] = useState({});
  const [coupon, setCoupon] = useState('');
  const [couponApplied, setCouponApplied] = useState(false);
  const [form, setForm] = useState({ nome:'', sobrenome:'', email:'', cpf:'', telefone:'', cep:'', endereco:'', numero:'', complemento:'', bairro:'', cidade:'', estado:'', cardNum:'', cardName:'', cardExp:'', cardCvv:'' });

  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const discount = couponApplied ? Math.round(subtotal * 0.1) : 0;
  const pixDiscount = payMethod === 'pix' ? Math.round((subtotal - discount) * 0.05) : 0;
  const total = subtotal - discount - pixDiscount;

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const validate = () => {
    const e = {};
    if (!form.nome) e.nome = true;
    if (!form.email || !form.email.includes('@')) e.email = true;
    if (!form.cep) e.cep = true;
    if (!form.endereco) e.endereco = true;
    if (!form.numero) e.numero = true;
    if (!form.cidade) e.cidade = true;
    if (!form.estado) e.estado = true;
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const validatePayment = () => {
    if (payMethod !== 'card') return true;
    const e = {};
    if (!form.cardNum || form.cardNum.replace(/\s/g,'').length < 16) e.cardNum = true;
    if (!form.cardName) e.cardName = true;
    if (!form.cardExp) e.cardExp = true;
    if (!form.cardCvv || form.cardCvv.length < 3) e.cardCvv = true;
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const formatCard = v => v.replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim().slice(0,19);
  const formatExpiry = v => v.replace(/\D/g,'').replace(/^(.{2})(.)/,'$1/$2').slice(0,5);

  return (
    <div>
      <div className="checkout-layout">
        <div>
          <div style={{display:'flex',gap:0,marginBottom:32,borderBottom:'1px solid var(--border)',paddingBottom:16}}>
            {['Entrega','Pagamento'].map((s,i) => (
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginRight:24,opacity:step>=i+1?1:0.4,cursor:i===0?'pointer':'default'}} onClick={()=>i===0&&setStep(1)}>
                <div style={{width:24,height:24,borderRadius:'50%',background:step>=i+1?'var(--black)':'var(--border)',color:step>=i+1?'var(--white)':'var(--gray)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{step>i+1?'✓':i+1}</div>
                <span style={{fontSize:13,fontWeight:600,color:step===i+1?'var(--black)':'var(--gray)'}}>{s}</span>
              </div>
            ))}
          </div>

          {step === 1 && (
            <>
              <div className="checkout-step-label">Passo 1 de 2</div>
              <div className="checkout-section-title">Informações de Entrega</div>
              <div className="form-row">
                <div className="form-group"><label className="form-label">Nome *</label><input className={`form-input${errors.nome?' error':''}`} value={form.nome} onChange={e=>set('nome',e.target.value)} placeholder="João" /></div>
                <div className="form-group"><label className="form-label">Sobrenome</label><input className="form-input" value={form.sobrenome} onChange={e=>set('sobrenome',e.target.value)} placeholder="Silva" /></div>
              </div>
              <div className="form-row">
                <div className="form-group"><label className="form-label">E-mail *</label><input className={`form-input${errors.email?' error':''}`} type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="joao@email.com" /></div>
                <div className="form-group"><label className="form-label">Telefone</label><input className="form-input" value={form.telefone} onChange={e=>set('telefone',e.target.value)} placeholder="(11) 99999-9999" /></div>
              </div>
              <div className="form-row">
                <div className="form-group"><label className="form-label">CPF</label><input className="form-input" value={form.cpf} onChange={e=>set('cpf',e.target.value)} placeholder="000.000.000-00" /></div>
                <div className="form-group"><label className="form-label">CEP *</label><input className={`form-input${errors.cep?' error':''}`} value={form.cep} onChange={e=>set('cep',e.target.value)} placeholder="00000-000" /></div>
              </div>
              <div className="form-row" style={{gridTemplateColumns:'2fr 1fr'}}>
                <div className="form-group"><label className="form-label">Endereço *</label><input className={`form-input${errors.endereco?' error':''}`} value={form.endereco} onChange={e=>set('endereco',e.target.value)} placeholder="Rua das Flores" /></div>
                <div className="form-group"><label className="form-label">Número *</label><input className={`form-input${errors.numero?' error':''}`} value={form.numero} onChange={e=>set('numero',e.target.value)} placeholder="123" /></div>
              </div>
              <div className="form-row">
                <div className="form-group"><label className="form-label">Complemento</label><input className="form-input" value={form.complemento} onChange={e=>set('complemento',e.target.value)} placeholder="Apto 4B" /></div>
                <div className="form-group"><label className="form-label">Bairro</label><input className="form-input" value={form.bairro} onChange={e=>set('bairro',e.target.value)} placeholder="Centro" /></div>
              </div>
              <div className="form-row">
                <div className="form-group"><label className="form-label">Cidade *</label><input className={`form-input${errors.cidade?' error':''}`} value={form.cidade} onChange={e=>set('cidade',e.target.value)} placeholder="São Paulo" /></div>
                <div className="form-group"><label className="form-label">Estado *</label>
                  <select className={`form-select${errors.estado?' error':''}`} value={form.estado} onChange={e=>set('estado',e.target.value)}>
                    <option value="">Selecione...</option>
                    {['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'].map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <button className="place-order-btn" onClick={() => { if(validate()) setStep(2); }} style={{fontSize:18,padding:'14px'}}>
                CONTINUAR PARA PAGAMENTO →
              </button>
            </>
          )}

          {step === 2 && (
            <>
              <div className="checkout-step-label">Passo 2 de 2</div>
              <div className="checkout-section-title">Forma de Pagamento</div>
              <div className="payment-tabs">
                {[['card','💳 Cartão'],['pix','🟢 PIX'],['boleto','📄 Boleto']].map(([k,l])=>(
                  <button key={k} className={`payment-tab${payMethod===k?' active':''}`} onClick={()=>setPayMethod(k)}>{l}</button>
                ))}
              </div>
              {payMethod === 'card' && (
                <>
                  <div className="card-icons">{['VISA','MC','ELO','HIPERCARD','AMEX'].map(c=><div key={c} className="card-icon">{c}</div>)}</div>
                  <div className="form-row single"><div className="form-group"><label className="form-label">Número do Cartão *</label><input className={`form-input${errors.cardNum?' error':''}`} value={form.cardNum} onChange={e=>set('cardNum',formatCard(e.target.value))} placeholder="0000 0000 0000 0000" maxLength={19} /></div></div>
                  <div className="form-row single"><div className="form-group"><label className="form-label">Nome no Cartão *</label><input className={`form-input${errors.cardName?' error':''}`} value={form.cardName} onChange={e=>set('cardName',e.target.value.toUpperCase())} placeholder="JOÃO SILVA" /></div></div>
                  <div className="form-row">
                    <div className="form-group"><label className="form-label">Validade *</label><input className={`form-input${errors.cardExp?' error':''}`} value={form.cardExp} onChange={e=>set('cardExp',formatExpiry(e.target.value))} placeholder="MM/AA" maxLength={5} /></div>
                    <div className="form-group"><label className="form-label">CVV *</label><input className={`form-input${errors.cardCvv?' error':''}`} value={form.cardCvv} onChange={e=>set('cardCvv',e.target.value.replace(/\D/g,'').slice(0,4))} placeholder="123" maxLength={4} /></div>
                  </div>
                  <div className="form-row single"><div className="form-group"><label className="form-label">Parcelas</label>
                    <select className="form-select">{[...Array(12)].map((_,i)=><option key={i} value={i+1}>{i+1}x de R$ {(total/(i+1)).toFixed(2).replace('.',',')} {i===0?'à vista':i<5?'sem juros':''}</option>)}</select>
                  </div></div>
                </>
              )}
              {payMethod === 'pix' && <div className="pix-info"><div className="pix-title">🟢 PIX — <span className="pix-discount">5% de desconto!</span></div><div className="pix-desc">QR Code gerado após o pedido. Confirmação em até 5 minutos.<br/><br/><strong>Total com PIX: R$ {total.toLocaleString('pt-BR')}</strong></div></div>}
              {payMethod === 'boleto' && <div className="boleto-info"><div className="pix-title">📄 Boleto Bancário</div><div className="pix-desc">Vence em 3 dias úteis. Confirmação em até 2 dias após pagamento.</div></div>}
              <button className="place-order-btn" onClick={() => { if(validatePayment()) onSuccess({ form, cart, total, payMethod }); }}>
                {payMethod === 'pix' ? '🟢 GERAR QR CODE PIX' : payMethod === 'boleto' ? '📄 GERAR BOLETO' : '🔒 FINALIZAR PEDIDO'}
              </button>
              <div className="secure-checkout">🔒 Pagamento 100% seguro e criptografado</div>
            </>
          )}
        </div>

        {/* SIDEBAR */}
        <div className="checkout-sidebar">
          <div className="order-summary">
            <div className="summary-title">SEU PEDIDO</div>
            {cart.map((item, i) => (
              <div className="summary-item" key={i}>
                <div className="summary-img-wrap">
                  <div className="summary-img"><img src={variantImg(item.variant)} alt="produto" /></div>
                  <div className="summary-item-qty">{item.qty}</div>
                </div>
                <div className="summary-item-info">
                  <div className="summary-item-name">{variantLabel(item.variant)}</div>
                  <div className="summary-item-variant">Qtd: {item.qty}</div>
                  <button className="cart-remove" style={{marginTop:4}} onClick={() => onRemove(i)}>× Remover</button>
                </div>

              </div>
            ))}
            <div className="coupon-row">
              <input className="coupon-input" placeholder="Cupom de desconto" value={coupon} onChange={e=>setCoupon(e.target.value.toUpperCase())} />

/* ===== APP ===== */
function App() {
  const [page, setPage] = useState(() => localStorage.getItem('pb_page') || 'landing');
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [successOrder, setSuccessOrder] = useState(null);

  useEffect(() => { localStorage.setItem('pb_page', page); }, [page]);

  const handleAddToCart = (item) => {
    setCart(c => {
      const idx = c.findIndex(i => i.variant === item.variant);
      if (idx >= 0) { const nc = [...c]; nc[idx].qty += item.qty; return nc; }
      return [...c, item];
    });
    setCartOpen(true);
  };

  const handleRemove = (idx) => {
    setCart(c => c.filter((_, i) => i !== idx));
  };

  const handleQtyChange = (idx, newQty) => {
    if (newQty < 1) { handleRemove(idx); return; }
    setCart(c => c.map((item, i) => i === idx ? {...item, qty: newQty} : item));
  };

  const handleBuyNow = (item) => {
    setCart([item]);
    setCartOpen(false);
    setPage('checkout');
  };

  const handleCheckoutFromCart = () => {
    setCartOpen(false);
    setPage('checkout');
  };

  const handleSuccess = (order) => {
    setSuccessOrder(order);
    setCart([]);
    setPage('success');
  };

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  const goPage = (p) => {
    setPage(p);
    window.scrollTo(0, 0);
  };

  return (
    <>
      <Header cartCount={cartCount} onCartClick={() => setCartOpen(true)} setPage={goPage} />
      <CartDrawer
        cart={cart}
        open={cartOpen}
        onClose={() => setCartOpen(false)}
        onRemove={handleRemove}
        onQtyChange={handleQtyChange}
        onCheckout={handleCheckoutFromCart}
      />
      {page === 'landing'  && <LandingPage setPage={goPage} onAddToCart={handleAddToCart} />}
      {page === 'product'  && <ProductPage onAddToCart={handleAddToCart} onBuyNow={handleBuyNow} setPage={goPage} />}
      {page === 'checkout' && <CheckoutPage cart={cart.length > 0 ? cart : [{variant:'gol',qty:1,price:PRICE_BASE}]} onSuccess={handleSuccess} onRemove={handleRemove} onQtyChange={handleQtyChange} />}
      {page === 'success'  && <SuccessPage order={successOrder} onHome={() => goPage('landing')} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
