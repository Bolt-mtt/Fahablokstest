<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAHABLOKS – Carros de Montar Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #111111;
  --white: #ffffff;
  --bg: #f2f2f2;
  --red: #e63946;
  --yellow: #ffd60a;
  --gray: #777777;
  --gray-light: #f8f8f8;
  --border: #e5e5e5;
  --ff-display: 'Bebas Neue', sans-serif;
  --ff-body: 'DM Sans', sans-serif;
  --radius: 0px;
}
html { scroll-behavior: smooth; }
body { font-family: var(--ff-body); background: var(--bg); color: var(--black); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

/* ANN BAR */
.ann-bar { background: var(--red); color: var(--white); text-align: center; padding: 9px 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.ann-bar strong { color: var(--yellow); }

/* HEADER */
header { position: sticky; top: 0; z-index: 200; background: var(--black); }
.header-inner { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 68px; }
.logo { font-family: var(--ff-display); font-size: 26px; letter-spacing: 0.08em; color: var(--white); cursor: pointer; }
.logo span { color: var(--red); }
nav { display: flex; gap: 32px; }
nav a { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); text-decoration: none; letter-spacing: 0.04em; transition: color .2s; cursor: pointer; }
nav a:hover, nav a.active { color: var(--white); }
.header-right { display: flex; align-items: center; gap: 16px; }
.cart-btn { display: flex; align-items: center; gap: 8px; background: var(--red); color: var(--white); border: none; cursor: pointer; padding: 10px 20px; font-family: var(--ff-display); font-size: 16px; letter-spacing: 0.06em; transition: background .2s; position: relative; }
.cart-btn:hover { background: #c0303b; }
.cart-count { background: var(--yellow); color: var(--black); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; font-family: var(--ff-body); }

/* CART DRAWER */
.cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; opacity: 0; pointer-events: none; transition: opacity .3s; }
.cart-overlay.open { opacity: 1; pointer-events: all; }
.cart-drawer { position: fixed; top: 0; right: -440px; width: 440px; max-width: 100vw; height: 100vh; background: var(--white); z-index: 400; display: flex; flex-direction: column; transition: right .35s cubic-bezier(.4,0,.2,1); box-shadow: -8px 0 40px rgba(0,0,0,.15); }
.cart-drawer.open { right: 0; }
.cart-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 26px; border-bottom: 1px solid var(--border); background: var(--black); }
.cart-title { font-family: var(--ff-display); font-size: 22px; letter-spacing: 0.06em; color: var(--white); }
.cart-close { background: none; border: none; cursor: pointer; font-size: 22px; color: rgba(255,255,255,0.7); line-height: 1; transition: color .2s; }
.cart-close:hover { color: var(--white); }
.cart-body { flex: 1; overflow-y: auto; padding: 20px 26px; }
.cart-empty { text-align: center; padding: 60px 20px; }
.cart-empty-icon { font-size: 52px; margin-bottom: 16px; }
.cart-empty-text { font-size: 14px; color: var(--gray); margin-bottom: 24px; line-height: 1.6; }
.drawer-shop-btn { background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 18px; letter-spacing: 0.06em; padding: 12px 28px; transition: background .2s; }
.drawer-shop-btn:hover { background: var(--red); }
.cart-item { display: flex; gap: 14px; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid var(--border); }
.cart-item:last-child { border-bottom: none; }
.cart-item-img { width: 76px; height: 76px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
.cart-item-img img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
.cart-item-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 26px; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 2px; }
.cart-item-sub { font-size: 12px; color: var(--gray); margin-bottom: 10px; }
.cart-item-controls { display: flex; align-items: center; gap: 8px; }
.cart-qty-btn { width: 28px; height: 28px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.cart-qty-btn:hover { background: var(--black); color: var(--white); border-color: var(--black); }
.cart-qty-num { font-size: 14px; font-weight: 700; min-width: 24px; text-align: center; }
.cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
.cart-item-price { font-family: var(--ff-display); font-size: 18px; }
.cart-remove { background: none; border: none; cursor: pointer; color: var(--gray); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; transition: color .2s; }
.cart-remove:hover { color: var(--red); }
.cart-footer { padding: 20px 26px; border-top: 2px solid var(--black); }
.cart-subtotal-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 6px; }
.cart-total-row { display: flex; justify-content: space-between; font-family: var(--ff-display); font-size: 26px; letter-spacing: 0.02em; margin-bottom: 16px; }
.cart-checkout-btn { width: 100%; background: var(--red); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 22px; letter-spacing: 0.08em; padding: 16px; transition: background .2s; margin-bottom: 8px; }
.cart-checkout-btn:hover { background: #c0303b; }
.cart-view-btn { width: 100%; background: none; border: 2px solid var(--black); color: var(--black); cursor: pointer; font-family: var(--ff-body); font-size: 13px; font-weight: 700; padding: 12px; transition: all .2s; }
.cart-view-btn:hover { background: var(--black); color: var(--white); }

/* HERO */
.hero { background: var(--black); color: var(--white); padding: 80px 32px; text-align: center; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(230,57,70,0.18) 0%, transparent 65%); pointer-events: none; }
.hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.3); padding: 6px 16px; margin-bottom: 24px; }
.hero-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
.hero-eyebrow-text { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; color: var(--red); text-transform: uppercase; }
.hero-title { font-family: var(--ff-display); font-size: 88px; line-height: 0.92; letter-spacing: 0.03em; margin-bottom: 16px; }
.hero-title span { color: var(--red); display: block; }
.hero-sub { font-size: 16px; color: rgba(255,255,255,0.6); max-width: 520px; margin: 0 auto 40px; line-height: 1.7; }
.hero-stats { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; }
.hero-stat-num { font-family: var(--ff-display); font-size: 36px; color: var(--white); line-height: 1; }
.hero-stat-label { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }

/* CATALOG */
.catalog { max-width: 1300px; margin: 0 auto; padding: 56px 32px; }
.catalog-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
.catalog-title { font-family: var(--ff-display); font-size: 40px; letter-spacing: 0.04em; }
.filter-tabs { display: flex; gap: 0; border: 2px solid var(--black); overflow: hidden; }
.filter-tab { padding: 10px 22px; background: var(--white); border: none; cursor: pointer; font-family: var(--ff-body); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray); border-right: 2px solid var(--black); transition: all .2s; }
.filter-tab:last-child { border-right: none; }
.filter-tab.active { background: var(--black); color: var(--white); }
.filter-tab:hover:not(.active) { background: var(--bg); color: var(--black); }
.products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

/* PRODUCT CARD */
.product-card { background: var(--white); border: 1px solid var(--border); cursor: pointer; transition: box-shadow .25s, transform .25s; overflow: hidden; position: relative; }
.product-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,.12); transform: translateY(-4px); }
.card-img-wrap { aspect-ratio: 4/3; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.card-img-fallback { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; z-index: 1; }
.card-img-fallback .emoji { font-size: 52px; }
.card-img-fallback .car-name { font-family: var(--ff-display); font-size: 16px; letter-spacing: 0.06em; color: rgba(255,255,255,0.7); text-align: center; padding: 0 12px; }
.card-img-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 16px; z-index: 2; }
.card-badge { position: absolute; top: 12px; left: 12px; font-size: 9px; font-weight: 800; padding: 4px 10px; letter-spacing: 0.1em; text-transform: uppercase; z-index: 3; }
.card-badge.red { background: var(--red); color: var(--white); }
.card-badge.yellow { background: var(--yellow); color: var(--black); }
.card-badge.black { background: var(--black); color: var(--white); }
.card-body { padding: 18px 20px; }
.card-cat { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); margin-bottom: 4px; }
.card-name { font-size: 17px; font-weight: 800; line-height: 1.2; margin-bottom: 2px; }
.card-sub { font-size: 12px; color: var(--gray); margin-bottom: 12px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-prices { display: flex; align-items: baseline; gap: 8px; }
.card-price { font-family: var(--ff-display); font-size: 24px; color: var(--black); }
.card-old { font-size: 12px; color: var(--gray); text-decoration: line-through; }
.card-add-btn { background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 13px; letter-spacing: 0.06em; padding: 9px 16px; transition: background .2s; }
.card-add-btn:hover { background: var(--red); }
.card-add-btn.added { background: #27ae60; }

/* PRODUCT PAGE */
.breadcrumb { max-width: 1300px; margin: 0 auto; padding: 16px 32px; font-size: 12px; color: var(--gray); display: flex; gap: 6px; align-items: center; }
.breadcrumb a { color: var(--gray); text-decoration: none; cursor: pointer; }
.breadcrumb a:hover { color: var(--black); }
.breadcrumb-sep { color: var(--border); }
.product-layout { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 1fr 460px; gap: 56px; padding: 0 32px 80px; align-items: start; }
.gallery { position: sticky; top: 80px; }
.gallery-main { aspect-ratio: 1/1; position: relative; overflow: hidden; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
.gallery-main-fallback { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 1; }
.gallery-main-fallback .big-emoji { font-size: 96px; }
.gallery-main-fallback .car-label { font-family: var(--ff-display); font-size: 20px; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); }
.gallery-main img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 32px; z-index: 2; }
.gallery-badge { position: absolute; bottom: 14px; right: 14px; background: var(--black); color: var(--white); font-size: 9px; font-weight: 800; padding: 5px 12px; letter-spacing: 0.1em; text-transform: uppercase; z-index: 3; }

.product-info { padding-top: 4px; }
.product-cat-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 800; padding: 4px 12px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
.product-title { font-family: var(--ff-display); font-size: 52px; line-height: 0.95; letter-spacing: 0.02em; margin-bottom: 4px; }
.product-subtitle { font-size: 14px; color: var(--gray); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 16px; }
.rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.stars { color: var(--yellow); font-size: 15px; letter-spacing: 2px; }
.rating-num { font-size: 13px; color: var(--gray); }
.rating-count { font-size: 13px; font-weight: 700; color: var(--black); }
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.price-block { margin-bottom: 6px; }
.price-row { display: flex; align-items: baseline; gap: 12px; }
.price-main { font-family: var(--ff-display); font-size: 46px; line-height: 1; }
.price-old { font-size: 18px; color: var(--gray); text-decoration: line-through; }
.price-save { background: var(--red); color: var(--white); font-size: 11px; font-weight: 800; padding: 3px 9px; letter-spacing: 0.06em; }
.installments { font-size: 13px; color: var(--gray); margin-top: 6px; margin-bottom: 20px; }
.installments strong { color: var(--black); }
.pieces-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); padding: 6px 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 20px; }
.qty-row { display: flex; gap: 12px; align-items: stretch; margin-bottom: 12px; }
.qty-ctrl { display: flex; align-items: center; border: 2px solid var(--black); background: var(--white); }
.qty-btn { width: 44px; height: 54px; display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; font-size: 20px; color: var(--black); transition: background .2s; }
.qty-btn:hover { background: var(--bg); }
.qty-num { width: 44px; text-align: center; font-weight: 800; font-size: 16px; }
.add-btn { flex: 1; background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 20px; letter-spacing: 0.06em; height: 54px; transition: background .2s; }
.add-btn:hover { background: var(--red); }
.add-btn.added { background: #27ae60; }
.trust-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 24px; }
.trust-cell { background: var(--white); padding: 14px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; text-align: center; }
.trust-icon { font-size: 20px; }
.trust-label { font-size: 10px; font-weight: 800; letter-spacing: 0.04em; line-height: 1.3; }
.trust-sub { font-size: 9px; color: var(--gray); }
.accordion-item { border-top: 1px solid var(--border); }
.accordion-item:last-child { border-bottom: 1px solid var(--border); }
.accordion-trigger { width: 100%; background: none; border: none; cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 15px 0; font-family: var(--ff-body); font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--black); text-align: left; }
.accordion-icon { font-size: 18px; transition: transform .3s; }
.accordion-icon.open { transform: rotate(180deg); }
.accordion-body { padding-bottom: 16px; font-size: 13px; color: var(--gray); line-height: 1.7; }
.spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-top: 8px; }
.spec-item { display: flex; flex-direction: column; }
.spec-k { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray); }
.spec-v { font-size: 13px; color: var(--black); font-weight: 600; }

/* CART PAGE */
.cart-page { max-width: 1100px; margin: 0 auto; padding: 48px 32px 80px; }
.page-title { font-family: var(--ff-display); font-size: 52px; letter-spacing: 0.04em; margin-bottom: 32px; }
.cart-page-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; align-items: start; }
.cart-items-list { background: var(--white); border: 1px solid var(--border); }
.cart-page-item { display: flex; gap: 16px; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
.cart-page-item:last-child { border-bottom: none; }
.cart-page-img { width: 88px; height: 88px; flex-shrink: 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.cart-page-img img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
.cart-page-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.cart-page-info { flex: 1; }
.cart-page-name { font-size: 16px; font-weight: 800; margin-bottom: 2px; }
.cart-page-sub { font-size: 12px; color: var(--gray); margin-bottom: 12px; }
.cart-page-ctrl { display: flex; align-items: center; gap: 10px; }
.cpqb { width: 30px; height: 30px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.cpqb:hover { background: var(--black); color: var(--white); border-color: var(--black); }
.cpqn { font-size: 15px; font-weight: 700; min-width: 28px; text-align: center; }
.cp-remove { background: none; border: none; cursor: pointer; color: var(--gray); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; transition: color .2s; margin-left: 8px; }
.cp-remove:hover { color: var(--red); }
.cart-page-price { font-family: var(--ff-display); font-size: 22px; flex-shrink: 0; }

.cart-summary-box { background: var(--white); border: 1px solid var(--border); padding: 28px; position: sticky; top: 80px; }
.summary-title { font-family: var(--ff-display); font-size: 22px; letter-spacing: 0.04em; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.summary-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 10px; }
.summary-row.total { font-family: var(--ff-display); font-size: 26px; color: var(--black); margin-top: 14px; padding-top: 14px; border-top: 2px solid var(--black); }
.summary-free { color: #27ae60; font-weight: 700; }
.coupon-row { display: flex; gap: 8px; margin: 16px 0; }
.coupon-input { flex: 1; border: 1.5px solid var(--border); padding: 10px 12px; font-family: var(--ff-body); font-size: 13px; outline: none; transition: border-color .2s; }
.coupon-input:focus { border-color: var(--black); }
.coupon-btn { background: var(--black); color: var(--white); border: none; padding: 10px 16px; font-family: var(--ff-body); font-size: 11px; font-weight: 800; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; transition: background .2s; }
.coupon-btn:hover { background: var(--red); }
.checkout-btn { width: 100%; background: var(--red); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 22px; letter-spacing: 0.08em; padding: 16px; transition: background .2s; margin-top: 4px; }
.checkout-btn:hover { background: #c0303b; }
.secure-note { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; font-size: 11px; color: var(--gray); }

/* CONSTRUCTION MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-box { background: var(--white); max-width: 480px; width: 100%; padding: 48px 40px; text-align: center; position: relative; animation: modalIn .25s ease; }
@keyframes modalIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
.modal-icon { font-size: 56px; margin-bottom: 20px; }
.modal-title { font-family: var(--ff-display); font-size: 36px; letter-spacing: 0.04em; margin-bottom: 12px; }
.modal-text { font-size: 14px; color: var(--gray); line-height: 1.7; margin-bottom: 28px; }
.modal-close-btn { background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--ff-display); font-size: 18px; letter-spacing: 0.06em; padding: 14px 36px; transition: background .2s; }
.modal-close-btn:hover { background: var(--red); }

/* SUCCESS */
.success-wrap { max-width: 560px; margin: 80px auto; padding: 0 32px; text-align: center; }
.success-icon { font-size: 64px; margin-bottom: 20px; }
.success-title { font-family: var(--ff-display); font-size: 52px; letter-spacing: 0.04em; margin-bottom: 12px; }
.success-sub { font-size: 15px; color: var(--gray); line-height: 1.7; margin-bottom: 32px; }
.success-box { background: var(--white); border: 1px solid var(--border); padding: 24px; margin-bottom: 32px; text-align: left; }

/* ========== CART PAGE ========== */
function CartPage({ cart, onRemove, onQtyChange, onSuccess, setPage }) {
  const [coupon, setCoupon] = useState('');
  const [couponApplied, setCouponApplied] = useState(false);

  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const discountVal = couponApplied ? Math.round(subtotal * 0.1) : 0;
  const total = subtotal - discountVal;

  if (cart.length === 0) {
    return (
      <div className="empty-cart-page">
        <div className="empty-cart-icon">🛒</div>
        <div className="empty-cart-title">Carrinho Vazio</div>
        <div className="empty-cart-sub">Você ainda não adicionou nenhum produto.<br/>Explore nossa coleção!</div>
        <button className="continue-shop-btn" onClick={() => setPage('home')}>VER MODELOS</button>
      </div>
    );
  }

  return (
    <div className="cart-page">
      <div className="page-title">MEU CARRINHO</div>
      <div className="cart-page-layout">
        {/* ITEMS */}
        <div>
          <div className="cart-items-list">
            {cart.map((item, i) => (
              <div className="cart-page-item" key={i}>
                <div className="cart-page-img" style={{background:`${item.colorBg}33`}}>
                  <div className="cart-page-img-placeholder">{item.emoji}</div>
                </div>
                <div className="cart-page-info">
                  <div className="cart-page-name">{item.name}</div>
                  <div className="cart-page-sub">{item.subtitle} · {item.pieces?.toLocaleString()} peças</div>
                  <div className="cart-page-ctrl">
                    <button className="cpqb" onClick={() => onQtyChange(i, item.qty-1)}>−</button>
                    <span className="cpqn">{item.qty}</span>
                    <button className="cpqb" onClick={() => onQtyChange(i, item.qty+1)}>+</button>
                    <button className="cp-remove" onClick={() => onRemove(i)}>✕ Remover</button>
                  </div>
                </div>
                <div className="cart-page-price">R$ {fmtPrice(item.price * item.qty)}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:16,fontSize:13}}>
            <a onClick={() => setPage('home')} style={{cursor:'pointer',color:'var(--gray)',fontWeight:700,letterSpacing:'0.04em',textDecoration:'none'}}>← Continuar comprando</a>
          </div>
        </div>

        {/* SUMMARY */}
        <div className="cart-summary-box">
          <div className="summary-title">RESUMO DO PEDIDO</div>

          <div className="summary-row"><span>Subtotal ({cart.reduce((s,i)=>s+i.qty,0)} itens)</span><span>R$ {fmtPrice(subtotal)}</span></div>
          {discountVal > 0 && <div className="summary-row"><span>Desconto cupom</span><span style={{color:'#27ae60',fontWeight:700}}>−R$ {fmtPrice(discountVal)}</span></div>}
          <div className="summary-row"><span>Frete</span><span className="summary-free">GRÁTIS</span></div>
          <div className="summary-row total"><span>Total</span><span>R$ {fmtPrice(total)}</span></div>
          <div style={{fontSize:11,color:'var(--gray)',textAlign:'right',marginTop:4}}>ou 12x de R$ {(total/12).toFixed(2).replace('.',',')} sem juros</div>

          <div className="coupon-row">
            <input className="coupon-input" placeholder="Cupom de desconto" value={coupon} onChange={e => setCoupon(e.target.value.toUpperCase())} />
            <button className="coupon-btn" onClick={() => { if (coupon === 'FAHA10') setCouponApplied(true); }}>APLICAR</button>

/* ========== APP ========== */
function App() {
  const [page, setPage] = useState('home');
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [successTotal, setSuccessTotal] = useState(0);
  const [showModal, setShowModal] = useState(false);

  const goPage = (p) => { setPage(p); window.scrollTo(0, 0); };

  const handleAdd = (product) => {
    setCart(c => {
      const idx = c.findIndex(i => i.id === product.id);
      if (idx >= 0) {
        const nc = [...c];
        nc[idx] = { ...nc[idx], qty: nc[idx].qty + 1 };
        return nc;
      }
      return [...c, { ...product, qty: 1 }];
    });
    setCartOpen(true);
  };

  const handleRemove = (idx) => setCart(c => c.filter((_, i) => i !== idx));

  const handleQtyChange = (idx, newQty) => {
    if (newQty < 1) { handleRemove(idx); return; }
    setCart(c => c.map((item, i) => i === idx ? { ...item, qty: newQty } : item));
  };

  const handleSuccess = () => {
    setShowModal(true);
  };

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  return (
    <>
      <Header cartCount={cartCount} onCartClick={() => setCartOpen(true)} page={page} setPage={goPage} />
      <CartDrawer
        cart={cart}
        open={cartOpen}
        onClose={() => setCartOpen(false)}
        onRemove={handleRemove}
        onQtyChange={handleQtyChange}
        goCart={() => goPage('cart')}
      />

      {page === 'home' && (
        <HomePage
          setPage={goPage}
          setSelectedProduct={setSelectedProduct}
          onAdd={handleAdd}
        />
      )}
      {page === 'product' && selectedProduct && (
        <ProductPage
          product={selectedProduct}
          onAdd={handleAdd}
          setPage={goPage}
          setSelectedProduct={setSelectedProduct}
        />
      )}
      {page === 'cart' && (
        <CartPage
          cart={cart}
          onRemove={handleRemove}
          onQtyChange={handleQtyChange}
          onSuccess={handleSuccess}
          setPage={goPage}
        />
      )}
      {page === 'success' && (
        <SuccessPage total={successTotal} onHome={() => goPage('home')} />
      )}
      {showModal && <ConstructionModal onClose={() => setShowModal(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
